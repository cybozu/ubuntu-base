name: release
on:
  push:
    branches:
      - 'main'
env:
  go-version: 1.26
jobs:
  release:
    name: Build and release images
    strategy:
      fail-fast: false
      matrix:
        ubuntu-version: ["22.04", "24.04"]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64/v8
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to container registry
        run: echo ${{ secrets.QUAY_PASSWORD }} | docker login -u ${{ secrets.QUAY_USER }} --password-stdin quay.io
      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup golang
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ env.go-version }}
      - name: Install container-tag-exists
        run: go install github.com/Hsn723/container-tag-exists@v1.2.4
      - name: Resolve build variables
        run: |
          echo "UBUNTU_VERSION=${{ matrix.ubuntu-version }}" >> $GITHUB_ENV
          echo "TAG_MINIMAL=$(cat ${{ matrix.ubuntu-version }}/TAG_MINIMAL)" >> $GITHUB_ENV
          echo "TAG=$(cat ${{ matrix.ubuntu-version }}/TAG)" >> $GITHUB_ENV
          echo "DIGEST_DOCKERHUB_UBUNTU=$(cat ${{ matrix.ubuntu-version }}/DIGEST_DOCKERHUB_UBUNTU)" >> $GITHUB_ENV
      - name: Check if images need to be pushed
        id: check-push
        run: |
          TARGETS=()

          for image_name in ubuntu-minimal ubuntu ubuntu-dev ubuntu-debug; do
            if [[ "$image_name" == "ubuntu-minimal" ]]; then
              tag_name="$TAG_MINIMAL"
            else
              tag_name="$TAG"
            fi

            NEED_PUSH=false
            for repo in ghcr.io quay.io; do
              if ! container-tag-exists "${repo}/cybozu/${image_name}" "${tag_name}" >/dev/null 2>&1; then
                NEED_PUSH=true
                break
              fi
            done

            if [[ "$NEED_PUSH" == "true" ]]; then
              TARGETS+=("${image_name}")
            fi
          done

          if [[ ${#TARGETS[@]} -eq 0 ]]; then
            echo "needs-push=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs-push=true" >> "$GITHUB_OUTPUT"
            echo "targets=${TARGETS[*]}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push images with bake
        if: steps.check-push.outputs.needs-push == 'true'
        env:
          TARGETS: ${{ steps.check-push.outputs.targets }}
        run: |
          docker buildx bake -f docker-bake.hcl \
            --push \
            $TARGETS