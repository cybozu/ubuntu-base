name: release
on:
  push:
    branches:
      - 'main'
jobs:
  release:
    name: Build and release images
    strategy:
      fail-fast: false
      matrix:
        ubuntu-version: ["22.04", "24.04"]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64/v8
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Login to container registry
        run: echo ${{ secrets.QUAY_PASSWORD }} | docker login -u ${{ secrets.QUAY_USER }} --password-stdin quay.io
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve build variables
        run: |
          echo "UBUNTU_VERSION=${{ matrix.ubuntu-version }}" >> $GITHUB_ENV
          echo "TAG_MINIMAL=$(cat ${{ matrix.ubuntu-version }}/TAG_MINIMAL)" >> $GITHUB_ENV
          echo "TAG=$(cat ${{ matrix.ubuntu-version }}/TAG)" >> $GITHUB_ENV
          echo "DIGEST_DOCKERHUB_UBUNTU=$(cat ${{ matrix.ubuntu-version }}/DIGEST_DOCKERHUB_UBUNTU)" >> $GITHUB_ENV
      - name: Check if images need to be pushed
        id: check-push
        uses: ./.github/actions/check-push
        with:
          ubuntu_version: ${{ matrix.ubuntu-version }}
      - name: Build and push images with bake
        if: steps.check-push.outputs.needs-push == 'true'
        env:
          TARGETS: ${{ steps.check-push.outputs.targets }}
        run: |
          docker buildx bake -f docker-bake.hcl \
            --push \
            $TARGETS