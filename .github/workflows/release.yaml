name: release
on:
  push:
    branches:
      - 'main'
jobs:
  release:
    name: Build and release images
    strategy:
      fail-fast: false
      matrix:
        ubuntu-version: ["22.04", "24.04"]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64/v8
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Login to container registry
        run: echo ${{ secrets.QUAY_PASSWORD }} | docker login -u ${{ secrets.QUAY_USER }} --password-stdin quay.io
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve build variables
        run: |
          echo "UBUNTU_VERSION=${{ matrix.ubuntu-version }}" >> $GITHUB_ENV
          echo "TAG_MINIMAL=$(cat ${{ matrix.ubuntu-version }}/TAG_MINIMAL)" >> $GITHUB_ENV
          echo "TAG=$(cat ${{ matrix.ubuntu-version }}/TAG)" >> $GITHUB_ENV
          echo "DIGEST_DOCKERHUB_UBUNTU=$(cat ${{ matrix.ubuntu-version }}/DIGEST_DOCKERHUB_UBUNTU)" >> $GITHUB_ENV
      - name: Check if images need to be pushed
        id: check-push
        uses: ./.github/actions/check-push
        with:
          ubuntu_version: ${{ matrix.ubuntu-version }}
      - name: Build and push images with bake
        if: steps.check-push.outputs.needs-push == 'true'
        env:
          TARGETS: ${{ steps.check-push.outputs.targets }}
        run: |
          docker buildx bake -f docker-bake.hcl \
            --push \
            $TARGETS
      - name: Write scan targets
        env:
          TARGETS: ${{ steps.check-push.outputs.targets }}
        run: |
          printf "%s\n" "$TARGETS" > scan-targets.txt
      - name: Upload scan targets
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: scan-targets-${{ matrix.ubuntu-version }}
          path: scan-targets.txt
  scan-image:
    needs: release
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        ubuntu-version: ["22.04", "24.04"]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: scan-targets-${{ matrix.ubuntu-version }}
          path: scan-targets.txt
      - uses: ./.github/actions/setup-cosign
      - uses: ./.github/actions/setup-trivy
      - uses: ./.github/actions/setup-yamory-scripts
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan images
        env:
          YAMORY_ACCESS_TOKEN: ${{ secrets.YAMORY_ACCESS_TOKEN }}
          UBUNTU_VERSION: ${{ matrix.ubuntu-version }}
        run: |
          TARGETS=$(cat scan-targets.txt)
          if [[ -z "$TARGETS" ]]; then
            echo "No images to scan."
            exit 0
          fi

          while read -r image; do
            if [[ "$image" == "ubuntu-minimal" ]]; then
              TAG=$(cat "${UBUNTU_VERSION}/TAG_MINIMAL")
            else
              TAG=$(cat "${UBUNTU_VERSION}/TAG")
            fi
            export YAMORY_IMAGE_NAME="ghcr.io/cybozu/$image:$TAG"
            export YAMORY_IMAGE_IDENTIFIER="ghcr.io/cybozu/$image:${UBUNTU_VERSION}"
            yamory-image-scan
          done < scan-targets.txt
