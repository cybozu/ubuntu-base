name: release
on:
  push:
    branches:
      - 'main'
env:
  go-version: 1.26
jobs:
  release:
    name: Build and release images
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu-version: "22.04"
            digest-dockerhub-ubuntu: sha256:962f6cadeae0ea6284001009daa4cc9a8c37e75d1f5191cf0eb83fe565b63dd7
            digest-minimal: sha256:81507f913e77df078ce75b14d5d3cd42a314f335f7ced90a2d4c2864f7bbbd4b
            digest-ubuntu: sha256:fa38c1f1a65e0a98dc29b0c527454fde447e66b7617364a190c366a5e5d27560
          - ubuntu-version: "24.04"
            digest-dockerhub-ubuntu: sha256:c4a8d5503dfb2a3eb8ab5f807da5bc69a85730fb49b5cfca2330194ebcc41c7b
            digest-minimal: sha256:eb18868c75bbebaa11138382cd1dad8ac008a10cdecd4476da12c777b752498c
            digest-ubuntu: sha256:73fdd894bc00d9f1b8b65ae6eeaae25d600d3c54464898eed194d31ad8a7f50e
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      DIGEST_DOCKERHUB_UBUNTU: ${{ matrix.digest-dockerhub-ubuntu }}
      DIGEST_MINIMAL: ${{ matrix.digest-minimal }}
      DIGEST_UBUNTU: ${{ matrix.digest-ubuntu }}
    defaults:
      run:
        working-directory: ${{ matrix.ubuntu-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64/v8
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          version: v0.32.1
      - name: Login to container registry
        run: echo ${{ secrets.QUAY_PASSWORD }} | docker login -u ${{ secrets.QUAY_USER }} --password-stdin quay.io
      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup golang
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ env.go-version }}
      - name: Install container-tag-exists
        run: go install github.com/Hsn723/container-tag-exists@v1.2.4
      - name: Build and push ubuntu-minimal image if needed
        run: |
          TAG_MINIMAL=$(cat TAG_MINIMAL)
          for repo in ghcr.io quay.io; do
            c="$(container-tag-exists ${repo}/cybozu/ubuntu-minimal $TAG_MINIMAL 2>&1)"
            if [ "$c" = "" ]; then
              echo
              echo "building ubuntu-minimal ..."
              docker buildx build \
                --platform linux/amd64,linux/arm64/v8 \
                --push \
                -t ${repo}/cybozu/ubuntu-minimal:$TAG_MINIMAL \
                --build-arg TAG_MINIMAL=$TAG_MINIMAL \
                --build-arg DIGEST_DOCKERHUB_UBUNTU=$DIGEST_DOCKERHUB_UBUNTU \
                ubuntu-minimal
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract targets
        run: |
          TAG=$(cat TAG)
          for repo in ghcr.io quay.io; do
            for image in ubuntu ubuntu-dev ubuntu-debug; do
              c="$(container-tag-exists ${repo}/cybozu/$image $TAG 2>&1)"
              if [ "$c" = "" ]; then
                echo "build ${repo}/cybozu/$image:$TAG"
                echo ${repo}/cybozu/$image >> BUILDS
              fi
            done
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push images
        run: |
          if [ ! -f BUILDS ]; then
            echo "nothing to build."
            exit 0
          fi
          TAG_MINIMAL=$(cat TAG_MINIMAL)
          TAG=$(cat TAG)
          BRANCH=$(cat BRANCH)
          for d in $(cat BUILDS); do
            echo
            echo "building $d ..."
            dir=$(echo ${d} | awk -F'/' '{print $3}')
            docker buildx build \
              --platform linux/amd64,linux/arm64/v8 \
              --push \
              -t ${d}:$TAG \
              -t ${d}:$BRANCH \
              --build-arg TAG_MINIMAL=$TAG_MINIMAL \
              --build-arg TAG=$TAG \
              --build-arg DIGEST_DOCKERHUB_UBUNTU=$DIGEST_DOCKERHUB_UBUNTU \
              --build-arg DIGEST_MINIMAL=$DIGEST_MINIMAL \
              --build-arg DIGEST_UBUNTU=$DIGEST_UBUNTU \
              ${dir}
          done
