name: update
on:
  schedule:
    - cron: '0 22 * * 0-4' # 7:00 weekday, JST
  workflow_dispatch:
jobs:
  update:
    name: Update images
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.CYBOZU_NECO_PAT }}
      UBUNTU_VERSION: "22.04 24.04"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Check minimal image updates
        shell: bash -xe {0}
        run: |
          TOKEN=$(curl -sSf "https://auth.docker.io/token?scope=repository%3Alibrary%2Fubuntu%3Apull&service=registry.docker.io"| jq -r .token)
          updated_versions=()

          for version in ${{ env.UBUNTU_VERSION }}; do
            if [ "${version}" = "22.04" ]; then
              codename=jammy
            elif [ "${version}" = "24.04" ]; then
              codename=noble
            else
              echo "Unknown Ubuntu version: ${version}"
              exit 1
            fi
            LATEST_TAG=$(curl -sSf -H "Authorization: Bearer $TOKEN" "https://registry-1.docker.io/v2/library/ubuntu/tags/list" | jq -r ".tags[] | select(. | test(\"$codename-.*\"))" | tail -n1)
            if [ -z "$LATEST_TAG" ]; then
              echo "Failed to get the latest tag for $codename"
              exit 1
            fi

            LATEST_DIGEST=$(curl -sSI \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json" \
              "https://registry-1.docker.io/v2/library/ubuntu/manifests/${LATEST_TAG}" \
              | awk -F': ' '/[Dd]ocker-[Cc]ontent-[Dd]igest/ {gsub("\r", "", $2); print $2; exit}')
            if [ -z "$LATEST_DIGEST" ]; then
              echo "Failed to get the digest for $LATEST_TAG"
              exit 1
            fi

            TAG_MINIMAL=$(cat ./$version/TAG_MINIMAL)
            DIGEST_DOCKERHUB_UBUNTU=$(cat ./$version/DIGEST_DOCKERHUB_UBUNTU)

            if [[ "$TAG_MINIMAL" != "$LATEST_TAG" || "$DIGEST_DOCKERHUB_UBUNTU" != "$LATEST_DIGEST" ]]; then
              echo $LATEST_TAG > ./$version/TAG_MINIMAL
              echo $LATEST_DIGEST > ./$version/DIGEST_DOCKERHUB_UBUNTU
              updated_versions+=($version)
              echo "- Update $version minimal image from $TAG_MINIMAL to $LATEST_TAG" >> ./BODY
              echo "  - digest: $DIGEST_DOCKERHUB_UBUNTU -> $LATEST_DIGEST" >> ./BODY
            fi
          done

          echo "UPDATED_VERSIONS=$(printf '%s\n' "${updated_versions[@]}" | paste -sd ' ')" >> $GITHUB_ENV
      - name: Check package updates
        shell: bash -xe {0}
        run: |
          docker buildx use default
          updated_versions=(${{ env.UPDATED_VERSIONS }})

          for version in ${{ env.UBUNTU_VERSION }}; do
            export UBUNTU_VERSION=$version
            export TAG_MINIMAL=$(cat ./$version/TAG_MINIMAL)
            export TAG=$(cat ./$version/TAG)
            export DIGEST_DOCKERHUB_UBUNTU=$(cat ./$version/DIGEST_DOCKERHUB_UBUNTU)

            echo "building ${version} test images with bake"
            docker buildx bake -f docker-bake.hcl \
              --load \
              --set *.platform=linux/amd64 \
              --set ubuntu-minimal.tags=ghcr.io/cybozu/ubuntu-minimal:${TAG_MINIMAL}-new \
              --set ubuntu.tags=ghcr.io/cybozu/ubuntu:${version}-new \
              --set ubuntu-debug.tags=ghcr.io/cybozu/ubuntu-debug:${version}-new \
              --set ubuntu-dev.tags=ghcr.io/cybozu/ubuntu-dev:${version}-new

            for img in ubuntu ubuntu-debug ubuntu-dev; do
              docker pull ghcr.io/cybozu/$img:$TAG

              docker run --rm ghcr.io/cybozu/$img:$TAG dpkg -l > $img-$TAG
              docker run --rm ghcr.io/cybozu/$img:${version}-new dpkg -l > $img-${version}-new
              if ! diff -u $img-$TAG $img-${version}-new; then
                echo "- Update $img:${version} packages" >> ./BODY
                echo '```diff' >> ./BODY
                diff -u $img-$TAG $img-${version}-new >> ./BODY || true
                echo -e '```\n' >> ./BODY
                updated_versions+=($version)
              fi
            done
          done
          echo "UPDATED_VERSIONS=$(printf '%s\n' "${updated_versions[@]}" | paste -sd ' ')" >> $GITHUB_ENV
      - name: Update package documentation
        if: env.UPDATED_VERSIONS != ''
        shell: bash -xe {0}
        run: |
          for version in ${UPDATED_VERSIONS}; do
            TAG_MINIMAL=$(cat ./$version/TAG_MINIMAL)

            for img in ubuntu ubuntu-debug ubuntu-dev; do
              docker run --rm ghcr.io/cybozu/$img:${version}-new dpkg -l | awk 'NR>5 {print $2 "\t" $3 "\t" $4 "\t" substr($0, match($0, /[[:space:]]+[^[:space:]]+[[:space:]]+[^[:space:]]+[[:space:]]+[^[:space:]]+[[:space:]]+/) + RLENGTH)}' > /tmp/${img}-${version}-packages.txt

              echo "# $img:${version} Packages" > ./docs/${img}-${version}.md
              echo "" >> ./docs/${img}-${version}.md
              echo "| Name | Version | Description |" >> ./docs/${img}-${version}.md
              echo "|------|---------|-------------|" >> ./docs/${img}-${version}.md

              while IFS=$'\t' read -r name pkg_version arch description; do
                if [ -n "$name" ] && [ "$name" != "Desired=Unknown/Install/Remove/Purge/Hold" ]; then
                  echo "| $name | $pkg_version | $description |" >> ./docs/${img}-${version}.md
                fi
              done < /tmp/${img}-${version}-packages.txt
              rm -f /tmp/${img}-${version}-packages.txt

              if [ "$img" = "ubuntu-debug" ]; then
                GRPCURL_VERSION=$(docker run --rm ghcr.io/cybozu/$img:${version}-new grpcurl --version 2>&1 | head -1 | sed -nE 's/grpcurl v?([0-9.]+).*/\1/p')
                echo "| grpcurl | ${GRPCURL_VERSION:-unknown} | gRPC reflection and command-line tool |" >> ./docs/${img}-${version}.md
                CRANE_VERSION=$(docker run --rm ghcr.io/cybozu/$img:${version}-new crane version 2>/dev/null | head -1 | sed -nE 's/^([0-9]+(\.[0-9]+)*).*/\1/p')
                echo "| crane | ${CRANE_VERSION:-unknown} | crane is a tool for interacting with remote images and registries |" >> ./docs/${img}-${version}.md

                if [ "$version" = "24.04" ]; then
                  AWSCLI_VERSION=$(docker run --rm ghcr.io/cybozu/$img:${version}-new aws --version 2>/dev/null | head -1 | sed -nE 's/aws-cli\/([0-9.]+).*/\1/p')
                  echo "| awscli | ${AWSCLI_VERSION:-unknown} | Universal Command Line Interface for Amazon Web Services |" >> ./docs/${img}-${version}.md
                fi
              fi

              if [ "$img" = "ubuntu-dev" ]; then
                GH_VERSION=$(docker run --rm ghcr.io/cybozu/$img:${version}-new gh --version 2>/dev/null | head -1 | sed -nE 's/gh version ([0-9.]+).*/\1/p')
                echo "| gh | ${GH_VERSION:-unknown} | Work seamlessly with GitHub from the command line |" >> ./docs/${img}-${version}.md
              fi
            done
          done
      - name: Create PR
        if: env.UPDATED_VERSIONS != ''
        shell: bash -xe {0}
        run: |
          TODAY=$(TZ="Asia/Tokyo" date "+%Y%m%d")

          for version in ${UPDATED_VERSIONS}; do
            echo $version.$TODAY > ./$version/TAG
          done

          git config --global user.email "neco@cybozu.com"
          git config --global user.name "cybozu-neco"

          BRANCH=update-$TODAY
          git checkout -b $BRANCH
          git add -u
          git commit -m "Update images ($TODAY)"
          git push origin $BRANCH
          gh pr create --title "Update images ($TODAY)" --body-file ./BODY