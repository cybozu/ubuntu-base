name: build
on:
  pull_request:
env:
  go-version: 1.26
jobs:
  prepare-matrix:
    name: Prepare digest matrix
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.load.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Load digest matrix
        id: load
        run: |
          MATRIX_JSON=$(jq -c . .github/workflows/digest-matrix.json)
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
  build:
    name: Build images
    needs: prepare-matrix
    strategy:
        matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      DIGEST_DOCKERHUB_UBUNTU: ${{ matrix.digest-dockerhub-ubuntu }}
    defaults:
      run:
        working-directory: ${{ matrix.ubuntu-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup golang
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ env.go-version }}
      - name: Build images
        run: |
          TAG_MINIMAL=$(cat TAG_MINIMAL)
          TAG=$(cat TAG)

          echo
          echo "building ubuntu-minimal:$TAG_MINIMAL..."
          docker build \
            -t ghcr.io/cybozu/ubuntu-minimal:$TAG_MINIMAL \
            --build-arg TAG_MINIMAL=$TAG_MINIMAL \
            --build-arg DIGEST_DOCKERHUB_UBUNTU=$DIGEST_DOCKERHUB_UBUNTU \
            ubuntu-minimal
          
          DIGEST_MINIMAL=$(docker buildx imagetools inspect ghcr.io/cybozu/ubuntu-minimal:$TAG_MINIMAL | grep '^Digest:' | awk '{print $2}')

          echo
          echo "building ubuntu:$TAG_MINIMAL..."
          docker build \
            -t ghcr.io/cybozu/ubuntu:$TAG_MINIMAL \
            --build-arg TAG_MINIMAL=$TAG_MINIMAL \
            --build-arg DIGEST_MINIMAL=$DIGEST_MINIMAL \
            ubuntu

          DIGEST_UBUNTU=$(docker buildx imagetools inspect ghcr.io/cybozu/ubuntu:$TAG | grep '^Digest:' | awk '{print $2}')

          for image in ubuntu-dev ubuntu-debug; do
              echo
              echo "building $image:$TAG..."
              docker build \
                -t ghcr.io/cybozu/${image}:$TAG \
                --build-arg TAG=$TAG \
                --build-arg DIGEST_UBUNTU=$DIGEST_UBUNTU \
                ${image}
          done
