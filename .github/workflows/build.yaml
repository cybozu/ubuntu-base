name: build
on:
  pull_request:
env:
  go-version: 1.26
  DIGEST_DOCKERHUB_UBUNTU: sha256:962f6cadeae0ea6284001009daa4cc9a8c37e75d1f5191cf0eb83fe565b63dd7
  DIGEST_MINIMAL: sha256:81507f913e77df078ce75b14d5d3cd42a314f335f7ced90a2d4c2864f7bbbd4b
  DIGEST_UBUNTU: sha256:dc9813c92c113a479006a10695066e5f48f485ecf68ed8cacb16317afd4b8150
jobs:
  build:
    name: Build images
    strategy:
      matrix:
        ubuntu-version: ["22.04", "24.04"]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ matrix.ubuntu-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup golang
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ env.go-version }}
      - name: Build images
        run: |
          TAG_MINIMAL=$(cat TAG_MINIMAL)
          TAG=$(cat TAG)

          echo
          echo "building ubuntu-minimal:$TAG_MINIMAL..."
          docker build \
            -t ghcr.io/cybozu/ubuntu-minimal:$TAG_MINIMAL \
            --build-arg TAG_MINIMAL=$TAG_MINIMAL \
            --build-arg DIGEST_DOCKERHUB_UBUNTU=$DIGEST_DOCKERHUB_UBUNTU \
            ubuntu-minimal

          echo
          echo "building ubuntu:$TAG..."
          docker build \
            -t ghcr.io/cybozu/ubuntu:$TAG \
            --build-arg TAG=$TAG \
            --build-arg DIGEST_MINIMAL=$DIGEST_MINIMAL \
            ubuntu


          for image in ubuntu-dev ubuntu-debug; do
            echo
            echo "building $image:$TAG..."
            docker build \
              -t ghcr.io/cybozu/${image}:$TAG \
              --build-arg TAG=$TAG \
              --build-arg DIGEST_UBUNTU=$DIGEST_UBUNTU \
              ${image}
          done
