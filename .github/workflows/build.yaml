name: build
on:
  pull_request:
jobs:
  build:
    name: Build images
    strategy:
      matrix:
        ubuntu-version: ["22.04", "24.04"]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64/v8
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Resolve build variables
        run: |
          UBUNTU_VERSION=${{ matrix.ubuntu-version }}
          TAG_MINIMAL=$(cat ${UBUNTU_VERSION}/TAG_MINIMAL)
          TAG=$(cat ${UBUNTU_VERSION}/TAG)
          DIGEST_DOCKERHUB_UBUNTU=$(cat ${UBUNTU_VERSION}/DIGEST_DOCKERHUB_UBUNTU)

          for required in UBUNTU_VERSION TAG_MINIMAL TAG DIGEST_DOCKERHUB_UBUNTU; do
            if [[ -z "${!required}" ]]; then
              echo "required variable is empty: ${required}"
              exit 1
            fi
          done

          echo "UBUNTU_VERSION=${UBUNTU_VERSION}" >> $GITHUB_ENV
          echo "TAG_MINIMAL=${TAG_MINIMAL}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "DIGEST_DOCKERHUB_UBUNTU=${DIGEST_DOCKERHUB_UBUNTU}" >> $GITHUB_ENV

      - name: Build images
        run: |
          echo
          echo "building ${UBUNTU_VERSION}: default group..."
          docker buildx bake -f docker-bake.hcl